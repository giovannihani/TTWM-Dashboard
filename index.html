<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procurement Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;background:#f0f2f5;color:#222}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border-radius:14px;padding:36px 32px;width:320px;border:1px solid #e0e0e0}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo svg{display:block;margin:0 auto 10px}
.login-logo .app-name{font-size:18px;font-weight:700;color:#222}
.login-logo .app-sub{font-size:12px;color:#888;margin-top:2px}
.login-card label{display:block;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.login-card input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;margin-bottom:14px;color:#222}
.login-card input:focus{border-color:#378ADD}
.login-btn{width:100%;padding:11px;background:#378ADD;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.login-btn:hover{background:#2a6db5}
.login-err{color:#D85A30;font-size:12px;text-align:center;margin-top:10px;min-height:16px}

/* DASHBOARD */
#app{display:none}
.topbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:15px;font-weight:700;color:#222}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-pill{font-size:12px;color:#555;background:#f0f2f5;padding:5px 12px;border-radius:20px}
.btn-sm{font-size:12px;padding:6px 12px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;color:#555}
.btn-sm:hover{background:#f5f5f5}

/* FILTERS */
.filters{background:#fff;border-bottom:1px solid #e0e0e0;padding:12px 20px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:150px}
.fg label{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em}
.fg select,.fg input{padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;outline:none;color:#222;background:#fff;width:100%}
.fg select:focus,.fg input:focus{border-color:#378ADD}
.date-row{display:flex;gap:6px;align-items:center}
.date-row span{color:#aaa;font-size:12px}

/* CONTENT */
.content{padding:16px 20px;max-width:1300px;margin:0 auto}

/* MATERIAL SELECTOR */
.mat-selector{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e0e0e0;margin-bottom:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.mat-selector label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;white-space:nowrap}
.mat-selector select{flex:1;min-width:200px;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none}
.cat-badge{font-size:11px;padding:4px 10px;border-radius:5px;background:#e8f0fe;color:#1a56db;font-weight:500;white-space:nowrap}

/* GRID */
.grid-top{display:grid;grid-template-columns:1.2fr 1fr;gap:14px;margin-bottom:14px}
.card{background:#fff;border-radius:10px;padding:16px;border:1px solid #e0e0e0}
.card-title{font-size:12px;font-weight:600;color:#555;margin-bottom:14px}
.chart-wrap{position:relative;width:100%;height:300px}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;text-align:left;font-weight:600;color:#666;border-bottom:2px solid #eee;background:#fafafa;white-space:nowrap}
th.r{text-align:right}
td{padding:7px 10px;border-bottom:1px solid #f2f2f2;color:#333;vertical-align:middle}
td.r{text-align:right;font-weight:500}
td.mat{font-weight:600;font-size:11px;color:#555}
td.desc{font-size:12px;color:#333}
tr:hover td{background:#fafcff}
tr.total td{font-weight:700;background:#f5f5f5;border-top:2px solid #ddd}
.up{color:#D85A30}
.dn{color:#1D9E75}
.neu{color:#888}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #e0e0e0}
.kpi-label{font-size:11px;color:#888;margin-bottom:4px}
.kpi-value{font-size:20px;font-weight:700;color:#222}
.kpi-sub{font-size:11px;color:#aaa;margin-top:2px}

.loading{text-align:center;padding:4rem;color:#888}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:12px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 48 48"><rect width="48" height="48" rx="12" fill="#378ADD"/><path d="M14 34V20l10-8 10 8v14H28v-8h-8v8z" fill="#fff"/></svg>
      <div class="app-name">Procurement Dashboard</div>
      <div class="app-sub">Fresh Electric — Spare Parts</div>
    </div>
    <label>Username</label>
    <input type="text" id="u" placeholder="Enter username" onkeydown="if(event.key==='Enter')login()">
    <label>Password</label>
    <input type="password" id="p" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Sign In</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">Procurement Price Dashboard</div>
    <div class="topbar-right">
      <div class="user-pill" id="upill"></div>
      <button class="btn-sm" onclick="logout()">Sign out</button>
      <button class="btn-sm" onclick="loadAll()">↺ Refresh</button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <div class="fg">
      <label>Supplier</label>
      <select id="f-sup" onchange="applyFilters()"><option value="">All suppliers</option></select>
    </div>
    <div class="fg">
      <label>Date range</label>
      <div class="date-row">
        <input type="month" id="f-from" onchange="applyFilters()">
        <span>→</span>
        <input type="month" id="f-to" onchange="applyFilters()">
      </div>
    </div>
    <div class="fg">
      <label>Category</label>
      <select id="f-cat" onchange="applyFilters()"><option value="">All categories</option></select>
    </div>
  </div>

  <div class="content">
    <div id="root"><div class="loading">Loading data...</div></div>
  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────────────────
const USERS = { giovanni: "giovannihani" };

function login() {
  const u = document.getElementById("u").value.trim();
  const p = document.getElementById("p").value;
  if (USERS[u] && USERS[u] === p) {
    sessionStorage.setItem("user", u);
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("upill").textContent = u;
    loadAll();
  } else {
    document.getElementById("lerr").textContent = "Incorrect username or password.";
  }
}
function logout() {
  sessionStorage.removeItem("user");
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("u").value = "";
  document.getElementById("p").value = "";
  document.getElementById("lerr").textContent = "";
}
if (sessionStorage.getItem("user")) {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("upill").textContent = sessionStorage.getItem("user");
}

// ── Config ────────────────────────────────────────────────────────────────────
const SHEETS = {
  prices: "14UQ7jkJ8Iwf164nVpofCJBzFGDjbJRou",
  categories: "1ieNsiHChGmlhxfmHzJxo49armHCC1NEe",
};
const COLORS = ["#4472C4","#ED7D31","#A5A5A5","#FFC000","#5B9BD5","#70AD47","#FF0000"];

// ── Helpers ───────────────────────────────────────────────────────────────────
function toYM(v) {
  if (!v) return null;
  let d;
  if (typeof v === "number") d = new Date(Math.round((v - 25569) * 86400 * 1000));
  else d = new Date(v);
  if (isNaN(d)) return null;
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}
function mlabel(ym) {
  if (!ym) return "";
  const [y, m] = ym.split("-");
  return new Date(+y, +m - 1, 1).toLocaleString("en", { month: "short", year: "2-digit" });
}
function shortSup(s) {
  if (!s) return "—";
  const p = s.split("   ");
  return p.length > 1 ? p[1].trim() : s.trim();
}
function avg(arr) {
  if (!arr.length) return null;
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}

async function fetchSheet(id) {
  const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`;
  const res = await fetch(url);
  const txt = await res.text();
  const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map(r => {
    const obj = {};
    cols.forEach((c, i) => { obj[c] = r.c[i] ? r.c[i].v : null; });
    return obj;
  });
}

// ── State ─────────────────────────────────────────────────────────────────────
let DB = { prices: [], catMap: {} };
let filtered = [];
let selMat = "";

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  document.getElementById("root").innerHTML = `<div class="loading">Loading data from Google Sheets...</div>`;
  try {
    const [pricesRaw, catsRaw] = await Promise.all([
      fetchSheet(SHEETS.prices),
      fetchSheet(SHEETS.categories),
    ]);

    // Parse prices
    DB.prices = pricesRaw.map(r => ({
      material: String(r["Material"] ?? "").trim(),
      ym: toYM(r["Date "] ?? r["Date"]),
      price: parseFloat(r["Price"]) || 0,
      supplier: String(r["Supplier"] ?? "").trim(),
    })).filter(r => r.material && r.ym && r.price > 0);

    // Parse categories — key by material
    DB.catMap = {};
    catsRaw.forEach(r => {
      const m = String(r["Material"] ?? "").trim();
      if (m) DB.catMap[m] = {
        desc: String(r["Material Description"] ?? "").trim(),
        category: String(r["Category"] ?? "").trim(),
      };
    });

    // Populate filter dropdowns
    const suppliers = [...new Set(DB.prices.map(r => r.supplier))].sort();
    const categories = [...new Set(Object.values(DB.catMap).map(v => v.category))].filter(Boolean).sort();
    const months = DB.prices.map(r => r.ym).filter(Boolean).sort();

    document.getElementById("f-sup").innerHTML =
      `<option value="">All suppliers</option>` +
      suppliers.map(s => `<option value="${s}">${shortSup(s)}</option>`).join("");

    document.getElementById("f-cat").innerHTML =
      `<option value="">All categories</option>` +
      categories.map(c => `<option value="${c}">${c}</option>`).join("");

    document.getElementById("f-from").value = months[0] || "";
    document.getElementById("f-to").value = months[months.length - 1] || "";

    applyFilters();
  } catch (e) {
    document.getElementById("root").innerHTML = `
      <div style="text-align:center;padding:3rem;color:#D85A30">
        <div style="font-size:15px;margin-bottom:8px">Failed to load data</div>
        <div style="font-size:12px;color:#888;margin-bottom:14px">${e.message}</div>
        <button class="btn-sm" onclick="loadAll()">Retry</button>
      </div>`;
  }
}

// ── Filter ────────────────────────────────────────────────────────────────────
function applyFilters() {
  const sup = document.getElementById("f-sup").value;
  const cat = document.getElementById("f-cat").value;
  const from = document.getElementById("f-from").value;
  const to = document.getElementById("f-to").value;

  filtered = DB.prices.filter(r => {
    if (sup && r.supplier !== sup) return false;
    if (cat && DB.catMap[r.material]?.category !== cat) return false;
    if (from && r.ym < from) return false;
    if (to && r.ym > to) return false;
    return true;
  });

  // Get all materials in filtered data
  const mats = [...new Set(filtered.map(r => r.material))].sort();

  // Keep selected material if still valid, else pick first
  if (!selMat || !mats.includes(selMat)) selMat = mats[0] || "";

  render(mats);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(mats) {
  if (!filtered.length || !mats.length) {
    document.getElementById("root").innerHTML = `<div class="empty">No data for selected filters.</div>`;
    return;
  }

  const allMonths = [...new Set(filtered.map(r => r.ym))].sort();
  const allSuppliers = [...new Set(filtered.map(r => r.supplier))].sort();

  // Data for selected material only
  const matRows = filtered.filter(r => r.material === selMat);
  const matSuppliers = [...new Set(matRows.map(r => r.supplier))].sort();
  const matMonths = [...new Set(matRows.map(r => r.ym))].sort();

  // Current vs previous month
  const curM = allMonths[allMonths.length - 1];
  const preM = allMonths[allMonths.length - 2] || null;

  // Bottom table — all materials, current vs prev
  const tableRows = mats.map(mat => {
    const cur = filtered.filter(r => r.material === mat && r.ym === curM);
    const pre = filtered.filter(r => r.material === mat && r.ym === preM);
    if (!cur.length) return null;
    const cAvg = avg(cur.map(r => r.price));
    const pAvg = pre.length ? avg(pre.map(r => r.price)) : null;
    const diff = pAvg !== null ? cAvg - pAvg : null;
    const pct = pAvg ? ((cAvg - pAvg) / pAvg) * 100 : null;
    return { mat, cAvg, pAvg, diff, pct };
  }).filter(Boolean);

  const tCur = avg(tableRows.map(r => r.cAvg));
  const tPre = avg(tableRows.filter(r => r.pAvg !== null).map(r => r.pAvg));
  const tDiff = tCur !== null && tPre !== null ? tCur - tPre : null;
  const tPct = tPre ? ((tCur - tPre) / tPre) * 100 : null;

  // Chart datasets for selected material
  const datasets = matSuppliers.map((sup, i) => {
    const bm = {};
    matRows.filter(r => r.supplier === sup).forEach(r => { bm[r.ym] = r.price; });
    return {
      label: shortSup(sup),
      data: matMonths.map(m => bm[m] ?? null),
      borderColor: COLORS[i % COLORS.length],
      backgroundColor: COLORS[i % COLORS.length] + "22",
      tension: 0.3, spanGaps: true, pointRadius: 5, fill: false,
    };
  });

  // Latest price for selected material
  const latestRow = [...matRows].sort((a, b) => b.ym.localeCompare(a.ym))[0];
  const latestPrice = latestRow ? latestRow.price : null;
  const latestSup = latestRow ? shortSup(latestRow.supplier) : "—";
  const catInfo = DB.catMap[selMat];

  document.getElementById("root").innerHTML = `

    <!-- Material selector -->
    <div class="mat-selector">
      <label>Material</label>
      <select onchange="selMat=this.value;render(${JSON.stringify(mats)})">
        ${mats.map(m => {
          const info = DB.catMap[m];
          return `<option value="${m}" ${m === selMat ? "selected" : ""}>${m}${info ? " — " + info.desc : ""}</option>`;
        }).join("")}
      </select>
      ${catInfo ? `<div class="cat-badge">${catInfo.category}</div>` : ""}
    </div>

    <!-- KPIs -->
    <div class="kpis">
      <div class="kpi">
        <div class="kpi-label">Latest price</div>
        <div class="kpi-value">${latestPrice !== null ? "$" + latestPrice.toFixed(4) : "—"}</div>
        <div class="kpi-sub">${latestRow ? mlabel(latestRow.ym) + " · " + latestSup : ""}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Suppliers</div>
        <div class="kpi-value">${matSuppliers.length}</div>
        <div class="kpi-sub">for this material</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Months tracked</div>
        <div class="kpi-value">${matMonths.length}</div>
        <div class="kpi-sub">${mlabel(matMonths[0])} → ${mlabel(matMonths[matMonths.length - 1])}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">vs last month</div>
        <div class="kpi-value ${(() => { const r = tableRows.find(r => r.mat === selMat); return r && r.diff !== null ? r.diff > 0 ? "up" : "dn" : ""; })()}">
          ${(() => {
            const r = tableRows.find(r => r.mat === selMat);
            if (!r || r.pct === null) return "—";
            return (r.pct >= 0 ? "▲ +" : "▼ ") + r.pct.toFixed(2) + "%";
          })()}
        </div>
        <div class="kpi-sub">price change</div>
      </div>
    </div>

    <!-- Chart + supplier table -->
    <div class="grid-top">
      <div class="card">
        <div class="card-title">Price trend by supplier — ${catInfo ? catInfo.desc : selMat}</div>
        <div class="chart-wrap"><canvas id="lineChart" role="img" aria-label="Price trend chart"></canvas></div>
      </div>
      <div class="card" style="overflow-x:auto">
        <div class="card-title">Supplier price comparison — latest per month</div>
        <table>
          <thead><tr>
            <th>Month</th>
            ${matSuppliers.map(s => `<th class="r">${shortSup(s)}</th>`).join("")}
          </tr></thead>
          <tbody>
            ${matMonths.slice().reverse().map(m => `<tr>
              <td>${mlabel(m)}</td>
              ${matSuppliers.map(s => {
                const row = matRows.find(r => r.supplier === s && r.ym === m);
                return `<td class="r">${row ? "$" + row.price.toFixed(4) : "—"}</td>`;
              }).join("")}
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Current vs Previous month table -->
    <div class="card" style="overflow-x:auto">
      <div class="card-title">
        All materials — Current month (${mlabel(curM)}) vs Previous month (${mlabel(preM) || "—"})
      </div>
      <table>
        <thead><tr>
          <th>Material</th>
          <th>Description</th>
          <th>Category</th>
          <th class="r">Current (${mlabel(curM)})</th>
          <th class="r">Previous (${mlabel(preM) || "—"})</th>
          <th class="r">Difference</th>
          <th class="r">Change %</th>
        </tr></thead>
        <tbody>
          ${tableRows.map(r => {
            const info = DB.catMap[r.mat];
            const cls = r.diff === null ? "neu" : r.diff > 0 ? "up" : "dn";
            const arrow = r.diff === null ? "" : r.diff > 0 ? "▲ " : "▼ ";
            return `<tr>
              <td class="mat">${r.mat}</td>
              <td class="desc">${info ? info.desc : "—"}</td>
              <td><span class="cat-badge">${info ? info.category : "—"}</span></td>
              <td class="r">$${r.cAvg.toFixed(4)}</td>
              <td class="r">${r.pAvg !== null ? "$" + r.pAvg.toFixed(4) : "—"}</td>
              <td class="r ${cls}">${r.diff !== null ? (r.diff >= 0 ? "+" : "") + r.diff.toFixed(4) : "—"}</td>
              <td class="r ${cls}">${r.pct !== null ? arrow + (r.pct >= 0 ? "+" : "") + r.pct.toFixed(2) + "%" : "—"}</td>
            </tr>`;
          }).join("")}
          <tr class="total">
            <td colspan="3">Average</td>
            <td class="r">$${tCur.toFixed(4)}</td>
            <td class="r">${tPre !== null ? "$" + tPre.toFixed(4) : "—"}</td>
            <td class="r ${tDiff > 0 ? "up" : "dn"}">${tDiff !== null ? (tDiff >= 0 ? "+" : "") + tDiff.toFixed(4) : "—"}</td>
            <td class="r ${tDiff > 0 ? "up" : "dn"}">${tPct !== null ? (tDiff >= 0 ? "▲ +" : "▼ ") + tPct.toFixed(2) + "%" : "—"}</td>
          </tr>
        </tbody>
      </table>
    </div>
  `;

  // Draw chart
  setTimeout(() => {
    const ctx = document.getElementById("lineChart");
    if (!ctx) return;
    const ex = Chart.getChart(ctx); if (ex) ex.destroy();
    new Chart(ctx, {
      type: "line",
      data: { labels: matMonths.map(mlabel), datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: "bottom", labels: { boxWidth: 12, font: { size: 11 } } } },
        scales: {
          x: { ticks: { autoSkip: false, maxRotation: 45, font: { size: 10 } } },
          y: { ticks: { callback: v => "$" + v.toFixed(4), font: { size: 10 } } },
        },
      }
    });
  }, 50);
}

window.login = login;
window.logout = logout;
window.loadAll = loadAll;
window.applyFilters = applyFilters;

if (sessionStorage.getItem("user")) loadAll();
</script>
</body>
</html>
