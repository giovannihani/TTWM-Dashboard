<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;background:#f5f5f5;color:#222}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e8e8e8}
.login-card{background:#fff;border-radius:16px;padding:40px 32px;width:340px;border:1px solid #ddd;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo img{width:180px;height:auto;margin-bottom:14px}
.login-logo .app-name{font-size:16px;font-weight:700;color:#cc0000;letter-spacing:.02em}
.login-logo .app-sub{font-size:12px;color:#888;margin-top:3px}
.login-card label{display:block;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.login-card input{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;outline:none;margin-bottom:14px;color:#222;transition:border-color .2s}
.login-card input:focus{border-color:#cc0000}
.login-btn{width:100%;padding:12px;background:#cc0000;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:background .2s}
.login-btn:hover{background:#aa0000}
.login-err{color:#cc0000;font-size:12px;text-align:center;margin-top:10px;min-height:16px}

/* ── APP ── */
#app{display:none}
.topbar{background:#cc0000;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo img{height:32px;width:auto}
.topbar-center{font-size:15px;font-weight:700;color:#fff;letter-spacing:.03em}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-pill{font-size:12px;color:#fff;background:rgba(255,255,255,.2);padding:5px 12px;border-radius:20px}
.btn-sm{font-size:12px;padding:6px 12px;border:1.5px solid rgba(255,255,255,.5);border-radius:6px;background:transparent;cursor:pointer;color:#fff;transition:background .2s}
.btn-sm:hover{background:rgba(255,255,255,.15)}

/* ── FILTERS ── */
.filters{background:#fff;border-bottom:3px solid #cc0000;padding:12px 20px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:150px}
.fg label{font-size:10px;font-weight:700;color:#cc0000;text-transform:uppercase;letter-spacing:.05em}
.fg select,.fg input{padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:12px;outline:none;color:#222;background:#fff;width:100%;transition:border-color .2s}
.fg select:focus,.fg input:focus{border-color:#cc0000}
.date-row{display:flex;gap:6px;align-items:center}
.date-row span{color:#aaa;font-size:12px}

/* ── CONTENT ── */
.content{padding:16px 20px;max-width:1300px;margin:0 auto}

/* ── MATERIAL SELECTOR ── */
.mat-selector{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #ddd;border-left:4px solid #cc0000;margin-bottom:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.mat-selector label{font-size:11px;font-weight:700;color:#cc0000;text-transform:uppercase;white-space:nowrap}
.mat-selector select{flex:1;min-width:200px;padding:8px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;outline:none}
.mat-selector select:focus{border-color:#cc0000}
.cat-badge{font-size:11px;padding:4px 10px;border-radius:5px;background:#ffeeee;color:#cc0000;font-weight:600;white-space:nowrap;border:1px solid #ffcccc}

/* ── GRID ── */
.grid-top{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:14px}
.card{background:#fff;border-radius:10px;padding:16px;border:1px solid #ddd}
.card-title{font-size:12px;font-weight:700;color:#cc0000;margin-bottom:14px;text-transform:uppercase;letter-spacing:.03em}
.chart-wrap{position:relative;width:100%;height:300px}

/* ── TABLES ── */
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;text-align:left;font-weight:700;color:#fff;border-bottom:2px solid #aa0000;background:#cc0000;white-space:nowrap}
th.r{text-align:right}
td{padding:7px 10px;border-bottom:1px solid #f0f0f0;color:#333;vertical-align:middle}
td.r{text-align:right;font-weight:500}
tr:hover td{background:#fff5f5}
tr.total td{font-weight:700;background:#f9f9f9;border-top:2px solid #cc0000}
.up{color:#cc0000}
.dn{color:#1D9E75}
.neu{color:#aaa}

/* ── KPIs ── */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #ddd;border-top:3px solid #cc0000}
.kpi-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:600}
.kpi-value{font-size:20px;font-weight:700;color:#222}
.kpi-sub{font-size:11px;color:#aaa;margin-top:2px}

.loading{text-align:center;padding:4rem;color:#888}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:12px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.legend-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0}
@media(max-width:700px){.grid-top{grid-template-columns:1fr}}
</style>
</head>

<script>
const USERS={giovanni:"giovannihani"};
function login(){
  const u=document.getElementById("u").value.trim();
  const p=document.getElementById("p").value;
  if(USERS[u]&&USERS[u]===p){
    sessionStorage.setItem("user",u);
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("upill").textContent=u;
    loadAll();
  }else{document.getElementById("lerr").textContent="Incorrect username or password.";}
}
function logout(){
  sessionStorage.removeItem("user");
  document.getElementById("app").style.display="none";
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("u").value="";
  document.getElementById("p").value="";
  document.getElementById("lerr").textContent="";
}
if(sessionStorage.getItem("user")){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("upill").textContent=sessionStorage.getItem("user");
}

const SHEETS={prices:"14UQ7jkJ8Iwf164nVpofCJBzFGDjbJRou",categories:"1ieNsiHChGmlhxfmHzJxo49armHCC1NEe"};
const COLORS=["#4472C4","#ED7D31","#70AD47","#FFC000","#5B9BD5","#A5A5A5","#FF6B6B"];

function toYM(v){
  if(!v)return null;
  let d;
  if(typeof v==="number"){
    // Excel serial number
    d=new Date(Math.round((v-25569)*86400*1000));
  } else if(typeof v==="string"){
    // Handle M/D/YYYY or MM/DD/YYYY or YYYY-MM-DD
    if(v.includes("/")){
      const parts=v.split("/");
      if(parts.length===3){
        // M/D/YYYY format
        const month=parts[0].padStart(2,"0");
        const day=parts[1].padStart(2,"0");
        const year=parts[2].length===2?"20"+parts[2]:parts[2];
        d=new Date(`${year}-${month}-${day}`);
      }
    } else {
      d=new Date(v);
    }
  } else {
    d=new Date(v);
  }
  if(!d||isNaN(d))return null;
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}
function mlabel(ym){
  if(!ym)return"";
  const[y,m]=ym.split("-");
  return new Date(+y,+m-1,1).toLocaleString("en",{month:"short",year:"2-digit"});
}
function shortSup(s){
  if(!s)return"—";
  const p=s.trim().split(/\s{2,}/);
  return p.length>1?p[p.length-1].trim():s.trim();
}
function avgArr(arr){
  if(!arr||!arr.length)return null;
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}
async function fetchSheet(id){
  const url=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`;
  const res=await fetch(url);
  const txt=await res.text();
  const json=JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const cols=json.table.cols.map(c=>c.label);
  return json.table.rows.map(r=>{
    const obj={};
    cols.forEach((c,i)=>{obj[c]=r.c[i]?r.c[i].v:null;});
    return obj;
  });
}

let DB={prices:[],catMap:{},catMaterials:new Set()};
let filtered=[],selMat="";

async function loadAll(){
  document.getElementById("root").innerHTML=`<div class="loading">Loading data from Google Sheets...</div>`;
  try{
    const[pricesRaw,catsRaw]=await Promise.all([fetchSheet(SHEETS.prices),fetchSheet(SHEETS.categories)]);
    DB.catMap={};DB.catMaterials=new Set();
    catsRaw.forEach(r=>{
      const m=String(r["Material"]??"").trim();
      if(!m)return;
      DB.catMap[m]={desc:String(r["Material Description"]??"").trim(),category:String(r["Category"]??"").trim()};
      DB.catMaterials.add(m);
    });
    DB.prices=pricesRaw.map(r=>({
      material:String(r["Material"]??"").trim(),
      ym:toYM(r["Date "]??r["Date"]),
      price:parseFloat(r["Price"])||0,
      supplier:String(r["Supplier"]??"").trim(),
    })).filter(r=>r.material&&r.ym&&r.price>0&&DB.catMaterials.has(r.material));

    const suppliers=[...new Set(DB.prices.map(r=>r.supplier))].sort();
    const categories=[...new Set(Object.values(DB.catMap).map(v=>v.category))].filter(Boolean).sort();
    const months=DB.prices.map(r=>r.ym).filter(Boolean).sort();

    document.getElementById("f-sup").innerHTML=`<option value="">All suppliers</option>`+suppliers.map(s=>`<option value="${s}">${shortSup(s)}</option>`).join("");
    document.getElementById("f-cat").innerHTML=`<option value="">All categories</option>`+categories.map(c=>`<option value="${c}">${c}</option>`).join("");
    document.getElementById("f-from").value=months[0]||"";
    document.getElementById("f-to").value=months[months.length-1]||"";
    applyFilters();
  }catch(e){
    document.getElementById("root").innerHTML=`<div style="text-align:center;padding:3rem;color:#cc0000">
      <div style="font-size:15px;margin-bottom:8px">Failed to load data</div>
      <div style="font-size:12px;color:#888;margin-bottom:14px">${e.message}</div>
      <button class="btn-sm" style="color:#cc0000;border-color:#cc0000" onclick="loadAll()">Retry</button>
    </div>`;
  }
}

function applyFilters(){
  const sup=document.getElementById("f-sup").value;
  const cat=document.getElementById("f-cat").value;
  const from=document.getElementById("f-from").value;
  const to=document.getElementById("f-to").value;
  filtered=DB.prices.filter(r=>{
    if(sup&&r.supplier!==sup)return false;
    if(cat&&DB.catMap[r.material]?.category!==cat)return false;
    if(from&&r.ym<from)return false;
    if(to&&r.ym>to)return false;
    return true;
  });
  const mats=[...new Set(filtered.map(r=>r.material))].sort();
  if(!selMat||!mats.includes(selMat))selMat=mats[0]||"";
  render(mats);
}

function render(mats){
  if(!filtered.length||!mats.length){
    document.getElementById("root").innerHTML=`<div class="empty">No data for selected filters.</div>`;
    return;
  }
  const allMonths=[...new Set(filtered.map(r=>r.ym))].sort();
  const curM=allMonths[allMonths.length-1];
  const preM=allMonths[allMonths.length-2]||null;
  const from=document.getElementById("f-from").value;
  const to=document.getElementById("f-to").value;

  const allSupForMat=[...new Set(DB.prices.filter(r=>r.material===selMat).map(r=>r.supplier))].sort();
  const matMonths=[...new Set(
    DB.prices.filter(r=>r.material===selMat&&(!from||r.ym>=from)&&(!to||r.ym<=to)).map(r=>r.ym)
  )].sort();

  const datasets=allSupForMat.map((sup,i)=>{
    const bm={};
    DB.prices.filter(r=>r.material===selMat&&r.supplier===sup&&(!from||r.ym>=from)&&(!to||r.ym<=to))
      .forEach(r=>{bm[r.ym]=r.price;});
    return{
      label:shortSup(sup),
      data:matMonths.map(m=>bm[m]??null),
      borderColor:COLORS[i%COLORS.length],
      backgroundColor:COLORS[i%COLORS.length]+"22",
      tension:0.3,spanGaps:true,pointRadius:5,pointHoverRadius:7,fill:false,borderWidth:2,
    };
  });

  const supTableMonths=[...new Set(DB.prices.filter(r=>r.material===selMat).map(r=>r.ym))].sort().reverse();
  const tableRows=mats.map(mat=>{
    const cur=filtered.filter(r=>r.material===mat&&r.ym===curM);
    const pre=filtered.filter(r=>r.material===mat&&r.ym===preM);
    if(!cur.length)return null;
    const cAvg=avgArr(cur.map(r=>r.price));
    const pAvg=pre.length?avgArr(pre.map(r=>r.price)):null;
    const diff=pAvg!==null?cAvg-pAvg:null;
    const pct=pAvg?((cAvg-pAvg)/pAvg)*100:null;
    return{mat,cAvg,pAvg,diff,pct};
  }).filter(Boolean);

  const tCur=avgArr(tableRows.map(r=>r.cAvg));
  const tPre=avgArr(tableRows.filter(r=>r.pAvg!==null).map(r=>r.pAvg));
  const tDiff=tCur!==null&&tPre!==null?tCur-tPre:null;
  const tPct=tPre?((tCur-tPre)/tPre)*100:null;
  const latestRow=[...DB.prices.filter(r=>r.material===selMat)].sort((a,b)=>b.ym.localeCompare(a.ym))[0];
  const matPct=tableRows.find(r=>r.mat===selMat);
  const catInfo=DB.catMap[selMat];

  document.getElementById("root").innerHTML=`
    <div class="mat-selector">
      <label>Material</label>
      <select onchange="selMat=this.value;render(${JSON.stringify(mats)})">
        ${mats.map(m=>{const info=DB.catMap[m];return`<option value="${m}" ${m===selMat?"selected":""}>${m}${info?" — "+info.desc:""}</option>`;}).join("")}
      </select>
      ${catInfo?`<div class="cat-badge">${catInfo.category}</div>`:""}
    </div>

    <div class="kpis">
      <div class="kpi">
        <div class="kpi-label">Latest price</div>
        <div class="kpi-value">${latestRow?"$"+latestRow.price.toFixed(4):"—"}</div>
        <div class="kpi-sub">${latestRow?mlabel(latestRow.ym)+" · "+shortSup(latestRow.supplier):""}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Suppliers</div>
        <div class="kpi-value">${allSupForMat.length}</div>
        <div class="kpi-sub">${allSupForMat.map(s=>shortSup(s)).join(", ")}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Months tracked</div>
        <div class="kpi-value">${matMonths.length}</div>
        <div class="kpi-sub">${mlabel(matMonths[0])} → ${mlabel(matMonths[matMonths.length-1])}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">vs last month</div>
        <div class="kpi-value ${matPct&&matPct.pct!==null?matPct.pct>0?"up":"dn":"neu"}">
          ${matPct&&matPct.pct!==null?(matPct.pct>=0?"▲ +":"▼ ")+matPct.pct.toFixed(2)+"%":"—"}
        </div>
        <div class="kpi-sub">price change</div>
      </div>
    </div>

    <div class="grid-top">
      <div class="card">
        <div class="card-title">Price comparison by supplier — ${catInfo?catInfo.desc:selMat}</div>
        <div class="chart-wrap"><canvas id="lineChart" role="img" aria-label="Price chart"></canvas></div>
        <div class="legend" id="chart-legend"></div>
      </div>
      <div class="card" style="overflow-x:auto">
        <div class="card-title">Price per supplier per month</div>
        <table>
          <thead><tr>
            <th>Month</th>
            ${allSupForMat.map(s=>`<th class="r">${shortSup(s)}</th>`).join("")}
          </tr></thead>
          <tbody>
            ${supTableMonths.map(m=>`<tr>
              <td>${mlabel(m)}</td>
              ${allSupForMat.map((s,i)=>{
                const row=DB.prices.find(r=>r.material===selMat&&r.supplier===s&&r.ym===m);
                return`<td class="r" style="color:${row?COLORS[i%COLORS.length]:"#ccc"}">${row?"$"+row.price.toFixed(4):"—"}</td>`;
              }).join("")}
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card" style="overflow-x:auto">
      <div class="card-title">All materials — ${mlabel(curM)} vs ${mlabel(preM)||"previous month"}</div>
      <table>
        <thead><tr>
          <th>Material</th><th>Description</th><th>Category</th>
          <th class="r">Current (${mlabel(curM)})</th>
          <th class="r">Previous (${mlabel(preM)||"—"})</th>
          <th class="r">Difference</th>
          <th class="r">Change %</th>
        </tr></thead>
        <tbody>
          ${tableRows.map(r=>{
            const info=DB.catMap[r.mat];
            const cls=r.diff===null?"neu":r.diff>0?"up":"dn";
            const arrow=r.diff===null?"":r.diff>0?"▲ ":"▼ ";
            return`<tr onclick="selMat='${r.mat}';render(${JSON.stringify(mats)})" style="cursor:pointer${r.mat===selMat?";background:#fff5f5":""}">
              <td style="font-weight:600;font-size:11px;color:#cc0000">${r.mat}</td>
              <td>${info?info.desc:"—"}</td>
              <td><span class="cat-badge">${info?info.category:"—"}</span></td>
              <td class="r">$${r.cAvg.toFixed(4)}</td>
              <td class="r">${r.pAvg!==null?"$"+r.pAvg.toFixed(4):"—"}</td>
              <td class="r ${cls}">${r.diff!==null?(r.diff>=0?"+":"")+r.diff.toFixed(4):"—"}</td>
              <td class="r ${cls}">${r.pct!==null?arrow+(r.pct>=0?"+":"")+r.pct.toFixed(2)+"%":"—"}</td>
            </tr>`;
          }).join("")}
          <tr class="total">
            <td colspan="3">Average</td>
            <td class="r">$${tCur.toFixed(4)}</td>
            <td class="r">${tPre!==null?"$"+tPre.toFixed(4):"—"}</td>
            <td class="r ${tDiff>0?"up":"dn"}">${tDiff!==null?(tDiff>=0?"+":"")+tDiff.toFixed(4):"—"}</td>
            <td class="r ${tDiff>0?"up":"dn"}">${tPct!==null?(tDiff>=0?"▲ +":"▼ ")+tPct.toFixed(2)+"%":"—"}</td>
          </tr>
        </tbody>
      </table>
    </div>
  `;

  setTimeout(()=>{
    const ctx=document.getElementById("lineChart");
    if(!ctx)return;
    const ex=Chart.getChart(ctx);if(ex)ex.destroy();
    new Chart(ctx,{type:"line",data:{labels:matMonths.map(mlabel),datasets},options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: $${c.parsed.y?.toFixed(4)??"—"}`}}},
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:45,font:{size:10}}},
        y:{ticks:{callback:v=>"$"+v.toFixed(4),font:{size:10}}},
      },
    }});
    const leg=document.getElementById("chart-legend");
    if(leg)leg.innerHTML=allSupForMat.map((s,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div>${shortSup(s)}</div>`).join("");
  },50);
}

window.login=login;window.logout=logout;window.loadAll=loadAll;window.applyFilters=applyFilters;
if(sessionStorage.getItem("user"))loadAll();
</script>
</body>
</html>
