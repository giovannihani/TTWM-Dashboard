<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Debug</title>
<style>
body{font-family:monospace;padding:20px;background:#f5f5f5}
pre{background:#fff;padding:16px;border-radius:8px;border:1px solid #ddd;overflow-x:auto;font-size:12px}
button{padding:10px 20px;background:#cc0000;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-bottom:16px;font-size:14px}
h3{margin:16px 0 8px;color:#cc0000}
</style>
</head>
<body>
<h2>Google Sheets Debug</h2>
<button onclick="run()">Run Test</button>
<div id="out"></div>
<script>
async function run(){
  const out=document.getElementById("out");
  out.innerHTML="Loading...";
  try{
    const url1="https://docs.google.com/spreadsheets/d/14UQ7jkJ8Iwf164nVpofCJBzFGDjbJRou/gviz/tq?tqx=out:json";
    const r1=await fetch(url1);
    const t1=await r1.text();
    const j1=JSON.parse(t1.match(/setResponse\(([\s\S]*)\)/)[1]);
    const cols1=j1.table.cols.map(c=>c.label);
    const rows1=j1.table.rows.slice(0,3).map(r=>{
      const obj={};
      cols1.forEach((c,i)=>{obj[c]=r.c[i];});
      return obj;
    });
    const url2="https://docs.google.com/spreadsheets/d/1ieNsiHChGmlhxfmHzJxo49armHCC1NEe/gviz/tq?tqx=out:json";
    const r2=await fetch(url2);
    const t2=await r2.text();
    const j2=JSON.parse(t2.match(/setResponse\(([\s\S]*)\)/)[1]);
    const cols2=j2.table.cols.map(c=>c.label);
    const rows2=j2.table.rows.slice(0,3).map(r=>{
      const obj={};
      cols2.forEach((c,i)=>{obj[c]=r.c[i];});
      return obj;
    });
    out.innerHTML=`
      <h3>Prices — Column names:</h3>
      <pre>${JSON.stringify(cols1,null,2)}</pre>
      <h3>Prices — First 3 rows RAW:</h3>
      <pre>${JSON.stringify(rows1,null,2)}</pre>
      <h3>Categories — Column names:</h3>
      <pre>${JSON.stringify(cols2,null,2)}</pre>
      <h3>Categories — First 3 rows RAW:</h3>
      <pre>${JSON.stringify(rows2,null,2)}</pre>
      <h3>Row counts:</h3>
      <pre>Prices: ${j1.table.rows.length}\nCategories: ${j2.table.rows.length}</pre>
    `;
  }catch(e){
    out.innerHTML=`<pre style="color:red">Error: ${e.message}</pre>`;
  }
}
</script>
</body>
</html>
