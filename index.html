<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procurement Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;background:#f5f5f5;color:#222;direction:ltr}
.container{max-width:900px;margin:0 auto;padding:1rem}
h1{font-size:18px;font-weight:500;margin-bottom:16px}
select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;outline:none;margin-bottom:12px}
button{padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer}
button:hover{background:#f0f0f0}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:#fff;border-radius:8px;padding:10px 14px;border:1px solid #eee}
.kpi-label{font-size:11px;color:#888;margin-bottom:4px}
.kpi-value{font-size:18px;font-weight:500}
.tabs{display:flex;border-bottom:1px solid #ddd;margin-bottom:16px}
.tab{background:none;border:none;border-bottom:2px solid transparent;border-radius:0;padding:8px 16px;font-size:13px;cursor:pointer;color:#888;margin-bottom:-1px}
.tab.active{border-bottom:2px solid #378ADD;color:#378ADD;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:8px;overflow:hidden}
th{text-align:left;padding:8px 10px;font-weight:500;background:#f8f8f8;border-bottom:1px solid #eee}
td{padding:7px 10px;border-bottom:1px solid #f0f0f0}
.badge{font-size:11px;padding:3px 8px;border-radius:5px;background:#e8f0fe;color:#1a56db}
.good{color:#1D9E75;font-weight:500}
.bad{color:#D85A30;font-weight:500}
.error{text-align:center;padding:3rem;color:#D85A30}
.loading{text-align:center;padding:3rem;color:#888}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.chart-wrap{position:relative;width:100%;height:260px;background:#fff;border-radius:8px;padding:12px;border:1px solid #eee;margin-bottom:16px}
.stat-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat{background:#fff;border-radius:8px;padding:8px 14px;flex:1 1 100px;border:1px solid #eee}
.stat-label{font-size:11px;color:#888;margin-bottom:2px}
.stat-value{font-size:15px;font-weight:500}
</style>
</head>
<body>
<div class="container">
  <div id="root"></div>
</div>

<script>
const SHEET_IDS = {
  prices: "14UQ7jkJ8Iwf164nVpofCJBzFGDjbJRou",
  po: "1IgGHgQcX2Tc4Rmcl3ryRZ7-eGIM5XZ2W",
  categories: "1ieNsiHChGmlhxfmHzJxo49armHCC1NEe",
  consumption: "1L51l01hpmzWdDDGZAA_2Gr5QrJWgTazk",
};
const COLORS = ["#378ADD","#1D9E75","#D85A30","#7F77DD","#BA7517","#A32D2D","#0F6E56"];

function toYM(v) {
  if (!v) return null;
  let d;
  if (typeof v === "number") d = new Date(Math.round((v - 25569) * 86400 * 1000));
  else d = new Date(v);
  if (isNaN(d)) return null;
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}
function monthLabel(ym) {
  if (!ym) return "";
  const [y, m] = ym.split("-");
  return new Date(+y, +m - 1, 1).toLocaleString("en", { month: "short", year: "2-digit" });
}

async function fetchSheet(id) {
  const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`;
  const res = await fetch(url);
  const txt = await res.text();
  const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const cols = json.table.cols.map(c => c.label);
  const rows = json.table.rows.map(r => r.c.map(c => c ? c.v : null));
  return rows.map(r => {
    const obj = {};
    cols.forEach((c, i) => { obj[c] = r[i]; });
    return obj;
  });
}

let state = { step: "loading", data: null, mat: "", tab: "prices", err: null };

function setState(p) { Object.assign(state, p); render(); }

async function loadAll() {
  setState({ step: "loading" });
  try {
    const [prices, po, cats, cons] = await Promise.all([
      fetchSheet(SHEET_IDS.prices),
      fetchSheet(SHEET_IDS.po),
      fetchSheet(SHEET_IDS.categories),
      fetchSheet(SHEET_IDS.consumption),
    ]);

    const priceRows = prices.map(r => ({
      material: String(r["Material"] ?? "").trim(),
      ym: toYM(r["Date "] ?? r["Date"]),
      price: parseFloat(r["Price"]) || 0,
      supplier: String(r["Supplier"] ?? "").trim(),
      factory: String(r["Factory name"] ?? "").trim(),
    })).filter(r => r.material && r.ym && r.price > 0);

    const consRows = cons.map(r => ({
      material: String(r["Material"] ?? "").trim(),
      desc: String(r["Material Description"] ?? "").trim(),
      ym: toYM(r["Posting Date"]),
      qty: Math.abs(parseFloat(r["Qty in unit of entry"] ?? 0)) || 0,
    })).filter(r => r.material && r.ym && r.qty > 0);

    const poRows = po.map(r => ({
      material: String(r["Material"] ?? "").trim(),
      desc: String(r["Short Text"] ?? "").trim(),
      ym: toYM(r["Document Date"] ?? r["Delivery Date"]),
      price: parseFloat(r["Net Price"] ?? 0) || 0,
      priceUnit: parseFloat(r["Price unit"] ?? 1) || 1,
      qty: parseFloat(r["Order Quantity"] ?? 0) || 0,
      supplier: String(r["Supplier/Supplying Plant"] ?? "").trim(),
      currency: String(r["Currency"] ?? "USD").trim(),
    })).filter(r => r.material && r.ym && r.price > 0);

    const catMap = {};
    cats.forEach(r => {
      const m = String(r["Material"] ?? "").trim();
      if (m) catMap[m] = { category: String(r["Category"] ?? "").trim(), desc: String(r["Material Description"] ?? "").trim() };
    });

    const descMap = {};
    [...consRows, ...poRows].forEach(r => { if (r.material && r.desc) descMap[r.material] = r.desc; });
    Object.entries(catMap).forEach(([m, v]) => { if (v.desc) descMap[m] = v.desc; });

    const allMaterials = [...new Set([
      ...priceRows.map(r => r.material),
      ...consRows.map(r => r.material),
      ...poRows.map(r => r.material)
    ])].sort();

    setState({ step: "dashboard", data: { prices: priceRows, cons: consRows, po: poRows, catMap, descMap, allMaterials }, mat: allMaterials[0] || "" });
  } catch (e) {
    setState({ step: "error", err: e.message });
  }
}

function drawLine(id, labels, datasets) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  const ex = Chart.getChart(ctx); if (ex) ex.destroy();
  new Chart(ctx, {
    type: "line", data: { labels, datasets },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "bottom", labels: { boxWidth: 10, font: { size: 11 } } } }, scales: { x: { ticks: { autoSkip: false, maxRotation: 45, font: { size: 10 } } }, y: { ticks: { callback: v => "$" + v } } } }
  });
}
function drawBar(id, labels, data) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  const ex = Chart.getChart(ctx); if (ex) ex.destroy();
  new Chart(ctx, {
    type: "bar", data: { labels, datasets: [{ label: "Qty", data, backgroundColor: "#378ADD55", borderColor: "#378ADD", borderWidth: 1 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { autoSkip: false, maxRotation: 45, font: { size: 10 } } }, y: { ticks: { callback: v => v.toLocaleString() } } } }
  });
}

function render() {
  const root = document.getElementById("root");
  if (!root) return;

  if (state.step === "loading") {
    root.innerHTML = `<div class="loading">جاري تحميل البيانات من Google Sheets...</div>`;
    return;
  }
  if (state.step === "error") {
    root.innerHTML = `<div class="error">
      <div style="font-size:16px;margin-bottom:8px">خطأ في تحميل البيانات</div>
      <div style="font-size:12px;color:#888;margin-bottom:16px">${state.err}</div>
      <button onclick="loadAll()">إعادة المحاولة</button>
    </div>`;
    return;
  }

  const d = state.data;
  const mat = state.mat;
  const matPrices = d.prices.filter(r => r.material === mat);
  const consByMonth = {};
  d.cons.filter(r => r.material === mat).forEach(r => { consByMonth[r.ym] = (consByMonth[r.ym] || 0) + r.qty; });
  const matCons = Object.entries(consByMonth).sort(([a], [b]) => a.localeCompare(b)).map(([ym, qty]) => ({ ym, qty }));
  const matPO = d.po.filter(r => r.material === mat);
  const suppliers = [...new Set(matPrices.map(r => r.supplier))];
  const allMonths = [...new Set([...matPrices.map(r => r.ym), ...matCons.map(r => r.ym), ...matPO.map(r => r.ym)])].filter(Boolean).sort();
  const poCmp = matPO.map(po => {
    const mkt = matPrices.filter(p => p.ym === po.ym);
    const avg = mkt.length ? mkt.reduce((s, r) => s + r.price, 0) / mkt.length : null;
    const unit = po.price / (po.priceUnit || 1);
    return { ym: po.ym, poPrice: unit, mktPrice: avg, diff: avg !== null ? ((unit - avg) / avg) * 100 : null, supplier: po.supplier, currency: po.currency, qty: po.qty };
  });
  const latestP = matPrices.length ? matPrices[matPrices.length - 1].price : null;
  const totalC = matCons.reduce((s, r) => s + r.qty, 0);
  const totalPO = matPO.reduce((s, r) => s + r.qty, 0);
  const cmpValid = poCmp.filter(r => r.diff !== null);
  const avgDiff = cmpValid.length ? cmpValid.reduce((s, r) => s + r.diff, 0) / cmpValid.length : 0;

  root.innerHTML = `
    <div class="header">
      <h1>Procurement Dashboard</h1>
      <button onclick="loadAll()">↺ تحديث</button>
    </div>

    <select onchange="setState({mat:this.value})">
      ${d.allMaterials.map(m => `<option value="${m}" ${m === mat ? "selected" : ""}>${m} — ${d.descMap[m] || d.catMap[m]?.desc || "—"}</option>`).join("")}
    </select>

    ${d.catMap[mat] ? `<div style="margin-bottom:12px"><span class="badge">${d.catMap[mat].category}</span></div>` : ""}

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Latest price</div><div class="kpi-value">${latestP != null ? "$" + latestP.toFixed(4) : "—"}</div></div>
      <div class="kpi"><div class="kpi-label">Total consumption</div><div class="kpi-value">${totalC.toLocaleString()}</div></div>
      <div class="kpi"><div class="kpi-label">Total PO qty</div><div class="kpi-value">${totalPO.toLocaleString()}</div></div>
      <div class="kpi"><div class="kpi-label">Avg PO vs market</div><div class="kpi-value ${avgDiff > 5 ? "bad" : avgDiff < -2 ? "good" : ""}">${cmpValid.length ? (avgDiff >= 0 ? "+" : "") + avgDiff.toFixed(1) + "%" : "—"}</div></div>
    </div>

    <div class="tabs">
      ${["prices", "consumption", "po"].map(id => `
        <button class="tab ${state.tab === id ? "active" : ""}" onclick="setState({tab:'${id}'})">
          ${{ prices: "Price history", consumption: "Monthly consumption", po: "PO vs market" }[id]}
        </button>
      `).join("")}
    </div>

    <div id="tab-content"></div>
  `;

  const tc = document.getElementById("tab-content");

  if (state.tab === "prices") {
    if (!matPrices.length) { tc.innerHTML = `<div style="text-align:center;padding:2rem;color:#888">لا يوجد بيانات أسعار لهذه المادة</div>`; return; }
    const lineDatasets = suppliers.map((sup, i) => {
      const bm = {}; matPrices.filter(r => r.supplier === sup).forEach(r => { bm[r.ym] = r.price; });
      return { label: sup.split("   ")[1] || sup, data: allMonths.map(m => bm[m] ?? null), borderColor: COLORS[i % COLORS.length], backgroundColor: COLORS[i % COLORS.length] + "22", tension: 0.3, spanGaps: true, pointRadius: 3 };
    });
    tc.innerHTML = `
      <div class="chart-wrap"><canvas id="priceChart" role="img" aria-label="Price history"></canvas></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>${["Month", "Supplier", "Factory", "Price"].map(h => `<th>${h}</th>`).join("")}</tr></thead>
          <tbody>
            ${[...matPrices].sort((a, b) => b.ym.localeCompare(a.ym)).map(r => `
              <tr>
                <td>${monthLabel(r.ym)}</td>
                <td style="color:#888">${r.supplier.split("   ")[1] || r.supplier}</td>
                <td style="color:#888">${r.factory || "—"}</td>
                <td style="font-weight:500">$${r.price.toFixed(4)}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>`;
    setTimeout(() => drawLine("priceChart", allMonths.map(monthLabel), lineDatasets), 50);
  }

  if (state.tab === "consumption") {
    if (!matCons.length) { tc.innerHTML = `<div style="text-align:center;padding:2rem;color:#888">لا يوجد بيانات استهلاك لهذه المادة</div>`; return; }
    const max = matCons.reduce((a, b) => b.qty > a.qty ? b : a, matCons[0]);
    tc.innerHTML = `
      <div class="stat-row">
        <div class="stat"><div class="stat-label">Total</div><div class="stat-value">${totalC.toLocaleString()}</div></div>
        <div class="stat"><div class="stat-label">Monthly avg</div><div class="stat-value">${Math.round(totalC / matCons.length).toLocaleString()}</div></div>
        <div class="stat"><div class="stat-label">Peak month</div><div class="stat-value">${monthLabel(max.ym)} — ${max.qty.toLocaleString()}</div></div>
      </div>
      <div class="chart-wrap"><canvas id="consChart" role="img" aria-label="Consumption"></canvas></div>`;
    setTimeout(() => drawBar("consChart", matCons.map(r => monthLabel(r.ym)), matCons.map(r => r.qty)), 50);
  }

  if (state.tab === "po") {
    if (!poCmp.length) { tc.innerHTML = `<div style="text-align:center;padding:2rem;color:#888">لا يوجد بيانات PO لهذه المادة</div>`; return; }
    tc.innerHTML = `
      <p style="font-size:13px;color:#888;margin-bottom:12px">سعر الـ PO مقارنة بمتوسط سعر السوق — أخضر أرخص، برتقالي أغلى</p>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>${["Month", "Supplier", "PO price", "Market avg", "Diff %", "Qty"].map(h => `<th>${h}</th>`).join("")}</tr></thead>
          <tbody>
            ${[...poCmp].sort((a, b) => b.ym.localeCompare(a.ym)).map(r => {
              const good = r.diff !== null && r.diff < 0;
              const bad = r.diff !== null && r.diff > 5;
              return `<tr>
                <td>${monthLabel(r.ym)}</td>
                <td style="color:#888;max-width:140px;overflow:hidden;text-overflow:ellipsis">${r.supplier.split("   ")[1] || r.supplier}</td>
                <td style="font-weight:500">${r.poPrice.toFixed(4)} ${r.currency}</td>
                <td>${r.mktPrice != null ? "$" + r.mktPrice.toFixed(4) : "—"}</td>
                <td class="${good ? "good" : bad ? "bad" : ""}">${r.diff != null ? (r.diff >= 0 ? "+" : "") + r.diff.toFixed(1) + "%" : "—"}</td>
                <td>${r.qty.toLocaleString()}</td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>`;
  }
}

window.setState = setState;
window.loadAll = loadAll;
render();
loadAll();
</script>
</body>
</html>
